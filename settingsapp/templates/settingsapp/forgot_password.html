{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <h2>Forgot Password</h2>
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            {{ form.username.label_tag }}
            {{ form.username }}
        </div>
        <div class="mb-3">
            {{ form.answer.label_tag }}
            {{ form.answer }}
        </div>
        <div class="mb-3">
            {{ form.new_password.label_tag }}
            {{ form.new_password }}
        </div>
        <button type="submit" class="btn btn-primary">Reset Password</button>
    </form>
</div>
{% endblock %}
