{% extends 'base.html' %}
{% block content %}
<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow rounded p-4">
        <h2>{{ template_data.title }}</h2>
        <hr>
        <form method="POST">
          {% csrf_token %}
          {{ form.as_p }}
          <button type="submit" class="btn btn-dark">Save Settings</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock content %}
